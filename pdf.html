<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southlofts - Sales Offer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Prioritize Gotham, fallback to Montserrat */
            font-family: 'Gotham', 'Montserrat', sans-serif;
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page-1 {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 1.414 / 1; 
            background-color: #101918;
            background-image: url('Background_doodle.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        /* All three main sections now share left: 8% to guarantee perfect vertical alignment */
        .pci-logo {
            position: absolute;
            top: 8%;
            left: 8%; 
            width: 220px; 
            height: auto;
        }

        .center-content {
            position: absolute;
            top: 50%;
            left: 8%; 
            transform: translateY(-50%); /* Only translate on the Y axis to center vertically */
            display: flex;
            flex-direction: column;
            width: 60%; 
            max-width: 700px;
        }

        .southloft-logo {
            width: 100%;
            height: auto;
            margin-bottom: 12px;
        }

        .bottom-left-content {
            position: absolute;
            bottom: 8%;
            left: 8%; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sales-offer {
            color: #7A9B76; 
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .details {
            color: #B5B7B6; 
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .pci-logo { width: 150px; }
            .sales-offer { font-size: 0.9rem; }
            .details { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="page-1">
        <img src="PCI_Logo.png" alt="Premier Choice Logo" class="pci-logo">

        <div class="center-content">
            <img src="SouthLoft_Logo.png" alt="Southlofts Logo" class="southloft-logo">
        </div>

        <div class="bottom-left-content">
            <div class="sales-offer">SALES OFFER</div>
            <div class="details">DD/MM/YYYY</div>
            <div class="details">PAYMENT PLAN TYPE</div>
        </div>
    </div>
</body>
</html>
